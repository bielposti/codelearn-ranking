  juegos.sort((a,b)=>b.p-a.p);

  const porPagina = 10;
  let paginaActual = 1;

  function estrellas(n) {
    let s = "";
    let medias = n;
    for (let i = 0; i < Math.floor(medias/2); i++) s += "★";
    if (medias % 2 === 1) s += "½";
    return s || "—";
  }

  function mostrarPagina(num) {
    paginaActual = num;
    const inicio = (num - 1) * porPagina;
    const fin = inicio + porPagina;
    const lista = juegos.slice(inicio, fin);

    const cont = document.getElementById("top-container");
    cont.innerHTML = `
      <div class="top-card">
        <h2 class="top-title">Top ${num}</h2>
        <table class="ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Juego</th>
              <th>Puntuación</th>
              <th>Estrellas</th>
              <th>Me gusta</th>
              <th>Descripción</th>
              <th>Scratch</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    `;

    const tbody = document.getElementById("ranking-body");
    tbody.innerHTML = "";

    lista.forEach((j, i) => {
      tbody.innerHTML += `
        <tr>
          <td>${inicio + i + 1}</td>
          <td>${j.nombre}</td>
          <td>${j.p}</td>
          <td class="stars">${estrellas(j.p)}</td>
          <td>${j.mg}</td>
          <td>${j.desc}</td>
          <td><a href="${j.link}" target="_blank">Ver</a></td>
        </tr>
      `;
    });

    const totalPaginas = Math.ceil(juegos.length / porPagina);
    const pagDiv = document.getElementById("pagination");
    pagDiv.innerHTML = "";

    for (let i = 1; i <= totalPaginas; i++) {
      pagDiv.innerHTML += `
        <button class="page-btn ${i === paginaActual ? "active" : ""}" onclick="mostrarPagina(${i})">${i}</button>
      `;
    }
  }

  mostrarPagina(1);
